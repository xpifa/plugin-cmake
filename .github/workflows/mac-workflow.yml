name: Mac Pipeline

on:
  push:
    branches:
      - main  # Triggers the workflow on pushes on this branch

env:
  PLUGIN_NAME: PLUGIN-CMAKE
  PLUGINS_FOLDER: /Users/runner/Library/Audio/Plug-Ins

jobs:
  build:
    name: Build on macos-14
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Ensure the latest version of CMake is installed
      - name: Get latest CMake
        uses: lukka/get-cmake@latest

      # Configure the project using CMake
      - name: Configure CMake
        run: cmake -S . -B build -DBUILD_TESTING=ON

      # Build all targets (including any current/future test executables)
      - name: Build
        run: cmake --build build --parallel

      - name: Run CTests
        run: ctest --test-dir build --output-on-failure --parallel

      # Build the plugin in Release mode
      - name: Build Plug-In
        run: cmake --build build --config Release

      # Upload the built plugin in github actions artifact
      - name: Upload Builds to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.PLUGIN_NAME }}-builds-artifact"
          path: ${{ env.PLUGINS_FOLDER }}

  pluginval:
    name: QA - Plugin Validation (pluginval)
    runs-on: macos-14
    needs: build

    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: "${{ env.PLUGIN_NAME }}-builds-artifact"
          path: plug-ins

      - name: Download pluginval
        run: |
          curl -fsSL -o pluginval.zip \
            https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
          unzip -q pluginval.zip

      - name: Validate VST3
        run: |
          ./pluginval.app/Contents/MacOS/pluginval \
            --strictness-level 5 \
            --validate "plug-ins/VST3/Audio_Distortion_Plugin.vst3"
